# Fly.io config for the POLLING bot (RUN=poll) — a background worker with no
# inbound port, since polling is an outbound-only connection to Twilio.
# One-time: `fly launch --no-deploy` (pick an app name → set it below), then
# `fly secrets set ...`, then `fly deploy` (or let the GitHub Action deploy).
app = "wa-bridge"
primary_region = "fra"

[build]

[env]
  RUN = "poll"

# One always-on machine runs the poller. No [http_service] — nothing listens.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# To run the webhook adapter instead (instant replies, needs a public URL):
# set RUN=webhook and add an [http_service] block on internal_port 8080.
