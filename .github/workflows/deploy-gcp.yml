name: deploy-gcp

# Auto-deploy the Hermes agent to the GCP VM on push to main: refresh SOUL.md
# into the (encrypted) ~/.hermes store and restart the user gateway service.
# Skips cleanly until GCP_VM_HOST is set, and can be paused with a repo Variable.
#   GitHub → Settings → Secrets and variables → Actions
#     Secrets:  GCP_VM_HOST, GCP_VM_USER, GCP_VM_SSH_KEY
#     Variable: DEPLOY_TARGET  = hermes (default) | off  (off/none disables deploy)
#     Variable: HERMES_UPGRADE = 1  (one-time: upgrade hermes on this deploy, then
#               set back to empty). Off by default so a working bot isn't churned.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run
        id: gate
        env:
          HOST: ${{ secrets.GCP_VM_HOST }}
          TARGET: ${{ vars.DEPLOY_TARGET }}
        run: |
          TARGET="${TARGET:-hermes}"          # default: deploy Hermes
          if [ -z "$HOST" ]; then
            echo "GCP_VM_HOST not set — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          elif [ "$TARGET" = "off" ] || [ "$TARGET" = "none" ]; then
            echo "DEPLOY_TARGET=$TARGET — auto-deploy disabled."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Deploying Hermes."
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Hermes agent
        if: steps.gate.outputs.run == 'true'
        uses: appleboy/ssh-action@v1
        env:
          # Managed from GitHub → Settings → Secrets → WHATSAPP_ALLOWED_USERS
          # (comma-separated digits+country code, no '+'). Kept as a Secret so the
          # phone numbers never live in this public repo. Empty = leave the VM's
          # current allowlist untouched.
          WA_ALLOWED: ${{ secrets.WHATSAPP_ALLOWED_USERS }}
          # One-time upgrade lever (Variable HERMES_UPGRADE=1). Empty = don't touch
          # the installed version.
          HERMES_UPGRADE: ${{ vars.HERMES_UPGRADE }}
          # One-time gross memory wipe (Variable HERMES_WIPE_MEMORY=1): archive the
          # whole conversation store so ALL users' memory resets. Empty = keep it.
          HERMES_WIPE_MEMORY: ${{ vars.HERMES_WIPE_MEMORY }}
          # Owner's WhatsApp number (Secret) — used ONLY to delete that one user's
          # own sessions when the DELETE_OWNER_SESSIONS sentinel is present. Kept as
          # a Secret so it's masked in this public log and never lives in the repo.
          OWNER_NUMBER: ${{ secrets.OWNER_WHATSAPP_NUMBER }}
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          envs: WA_ALLOWED,HERMES_UPGRADE,HERMES_WIPE_MEMORY,OWNER_NUMBER
          script: |
            set -e
            cd ~/chat
            git pull --ff-only
            # Ensure the encrypted store (~/.hermes) is mounted (survives reboots).
            sudo systemctl start hermes-crypt 2>/dev/null || true
            mountpoint -q ~/.hermes || gocryptfs -allow_other -passfile ~/.hermes.key ~/.hermes.cipher ~/.hermes || true
            # Refresh the persona from the repo into the (encrypted) store.
            curl -fsSL https://raw.githubusercontent.com/eliezeravihail/chat/main/SOUL.md -o ~/.hermes/SOUL.md || true
            # Sync the WhatsApp allowlist from the GitHub secret, if provided, so
            # "who the bot answers" is managed from GitHub instead of over SSH.
            if [ -n "${WA_ALLOWED}" ]; then
              touch ~/.hermes/.env && chmod 600 ~/.hermes/.env
              if grep -q '^WHATSAPP_ALLOWED_USERS=' ~/.hermes/.env; then
                sed -i "s|^WHATSAPP_ALLOWED_USERS=.*|WHATSAPP_ALLOWED_USERS=${WA_ALLOWED}|" ~/.hermes/.env
              else
                echo "WHATSAPP_ALLOWED_USERS=${WA_ALLOWED}" >> ~/.hermes/.env
              fi
            fi
            # Enforce per-user memory isolation (top-level gateway keys). Hermes
            # keys every WhatsApp DM by phone number and every group message by
            # participant, so one person's memory never bleeds into another's.
            # The default is already `true`, but we pin it explicitly so a stale
            # or hand-edited config.yaml can't leave it off. Idempotent: replace
            # the value if the key exists, else append it.
            CFG=~/.hermes/config.yaml
            touch "$CFG"
            if grep -q '^group_sessions_per_user:' "$CFG"; then
              sed -i 's|^group_sessions_per_user:.*|group_sessions_per_user: true|' "$CFG"
            else
              echo 'group_sessions_per_user: true' >> "$CFG"
            fi
            if grep -q '^thread_sessions_per_user:' "$CFG"; then
              sed -i 's|^thread_sessions_per_user:.*|thread_sessions_per_user: false|' "$CFG"
            else
              echo 'thread_sessions_per_user: false' >> "$CFG"
            fi
            # Force-disable the cross-user memory tools. `session_search` and the
            # `memory` toolset search/recall across ALL stored sessions with NO
            # per-user filter — on a shared bot they let one person's data surface
            # in another's chat (per-user session isolation does NOT stop this,
            # the tool reads the raw store directly). The repo helper merges them
            # into `agent.disabled_toolsets` (a global denylist that beats every
            # allowlist) with a YAML-aware, non-destructive edit.
            PYBIN="$HOME/hermes-env/bin/python"
            [ -x "$PYBIN" ] || PYBIN="$(command -v python3 || true)"
            [ -n "$PYBIN" ] && "$PYBIN" ~/chat/hermes/ensure-private-config.py "$CFG" || true
            # Clear the GLOBAL persistent-memory profile. Hermes stores one
            # ~/.hermes/memories/USER.md + MEMORY.md for ALL users, injects it into
            # every session's system prompt, and it survives /new — so it mixed the
            # two users. With the feature now disabled in config, empty these files
            # (backing up any non-empty one) so the mixed profile stops being
            # injected. Idempotent: once empty, later deploys skip them.
            for f in "$HOME/.hermes/memories/USER.md" "$HOME/.hermes/memories/MEMORY.md"; do
              if [ -s "$f" ]; then
                cp "$f" "$f.cleared.$(date +%Y%m%d%H%M%S)" 2>/dev/null || true
                : > "$f"
                echo "cleared $(basename "$f") (backed up)"
              fi
            done
            # Log the installed version every deploy (visible in the Actions run
            # log) — WhatsApp DM sessions are keyed per phone number only in
            # recent builds; an old build collapses all DMs into one shared
            # session (the cross-user memory leak).
            export PATH="$HOME/.local/bin:$HOME/bin:$HOME/hermes-env/bin:$PATH"
            echo "hermes version (before): $(hermes --version 2>/dev/null || echo unknown)"
            # One-time, opt-in upgrade (Variable HERMES_UPGRADE=1). This is the fix
            # for the DM memory leak: a current Hermes isolates DM memory per
            # sender automatically. Gated so a working bot isn't churned on every
            # push (version drift). Best-effort across possible install layouts.
            if [ "${HERMES_UPGRADE}" = "1" ]; then
              echo "HERMES_UPGRADE=1 — upgrading hermes-agent (best effort)"
              hermes self update 2>/dev/null \
                || hermes self-update 2>/dev/null \
                || "$HOME/hermes-env/bin/pip" install -q --upgrade hermes-agent 2>/dev/null \
                || pipx upgrade hermes-agent 2>/dev/null \
                || pip install --user -q --upgrade hermes-agent 2>/dev/null \
                || true
              echo "hermes version (after):  $(hermes --version 2>/dev/null || echo unknown)"
            fi
            # Restart the Hermes gateway. The official installer puts `hermes` on
            # PATH (~/.local/bin) and the gateway runs as a *user* service, so a
            # non-login SSH session needs XDG_RUNTIME_DIR + linger to reach it.
            export PATH="$HOME/.local/bin:$HOME/bin:$PATH"
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            sudo loginctl enable-linger "$(whoami)" 2>/dev/null || true
            # Gross memory wipe: archive the whole conversation store so ALL
            # users' memory resets to empty. Triggered by EITHER the Variable
            # HERMES_WIPE_MEMORY=1 (managed from GitHub) OR the presence of the
            # repo sentinel file hermes/WIPE_MEMORY (so a wipe can be triggered
            # by a commit alone, without touching GitHub settings — remove the
            # file in a follow-up commit so it doesn't wipe on every deploy).
            # state.db holds only transcripts/sessions (the WhatsApp pairing lives
            # elsewhere), and we move rather than delete so it stays recoverable.
            # A fresh store is created on the restart below.
            if [ "${HERMES_WIPE_MEMORY}" = "1" ] || [ -f ~/chat/hermes/WIPE_MEMORY ]; then
              echo "memory wipe requested — archiving conversation store (all memory reset)"
              systemctl --user stop hermes-gateway 2>/dev/null \
                || sudo systemctl stop hermes-gateway 2>/dev/null || true
              STAMP="$(date +%Y%m%d%H%M%S)"
              if [ -f "$HOME/.hermes/state.db" ]; then
                mv "$HOME/.hermes/state.db" "$HOME/.hermes/state.db.wiped.$STAMP" || true
                echo "archived state.db -> state.db.wiped.$STAMP"
              fi
            fi
            # One-shot restore: bring back the wiped conversation store. Triggered
            # by the repo sentinel hermes/RESTORE_MEMORY. Picks the LARGEST
            # state.db.wiped.* (later re-wipes archived an empty db; the largest is
            # the one with real data). Guarded by an on-VM marker so it runs at most
            # once even if the sentinel lingers. The current db and the backup are
            # both preserved. Safe now that session_search/memory are disabled, so
            # restoring old per-user data can't re-open the cross-user leak.
            if [ -f ~/chat/hermes/RESTORE_MEMORY ] && [ ! -f "$HOME/.hermes/.restored" ]; then
              BACKUP="$(ls -S "$HOME"/.hermes/state.db.wiped.* 2>/dev/null | head -1)"
              if [ -n "$BACKUP" ]; then
                echo "restore requested — restoring from $(basename "$BACKUP") ($(stat -c%s "$BACKUP" 2>/dev/null) bytes)"
                systemctl --user stop hermes-gateway 2>/dev/null \
                  || sudo systemctl stop hermes-gateway 2>/dev/null || true
                STAMP2="$(date +%Y%m%d%H%M%S)"
                [ -f "$HOME/.hermes/state.db" ] && mv "$HOME/.hermes/state.db" "$HOME/.hermes/state.db.prerestore.$STAMP2"
                cp "$BACKUP" "$HOME/.hermes/state.db" && touch "$HOME/.hermes/.restored"
                echo "restored state.db (marker written; backup kept at $(basename "$BACKUP"))"
              else
                echo "restore requested but no state.db.wiped.* backup found — skipping"
              fi
            fi
            # One-shot: delete ONLY the owner's own sessions from state.db, keyed by
            # their number (from the OWNER_WHATSAPP_NUMBER Secret, so it stays out of
            # this public log/repo). Runs when the sentinel hermes/DELETE_OWNER_SESSIONS
            # exists AND the secret is set AND it hasn't run before. The helper backs
            # up the db first and only removes rows whose session_key matches that
            # number, so everyone else's data (e.g. the friend's) is untouched.
            if [ -f ~/chat/hermes/DELETE_OWNER_SESSIONS ] && [ -n "${OWNER_NUMBER}" ] && [ ! -f "$HOME/.hermes/.owner_sessions_deleted" ]; then
              echo "owner-session delete requested"
              systemctl --user stop hermes-gateway 2>/dev/null \
                || sudo systemctl stop hermes-gateway 2>/dev/null || true
              "${PYBIN:-python3}" ~/chat/hermes/delete-user-sessions.py "$HOME/.hermes/state.db" "${OWNER_NUMBER}" \
                && touch "$HOME/.hermes/.owner_sessions_deleted"
            fi
            # Forced clean bridge restart (sentinel hermes/FORCE_BRIDGE_RESTART):
            # a plain `systemctl restart` hasn't been reviving the WhatsApp
            # (Baileys/node) bridge. Fully STOP the gateway (kills its child
            # processes in the service cgroup, including a stale bridge), ensure
            # the node bridge deps are present, then let the restart below start
            # it fresh. No pkill — matching 'whatsapp'/'node'/'baileys' would also
            # match THIS deploy script and kill the run.
            FORCE_BRIDGE=""
            if [ -f ~/chat/hermes/FORCE_BRIDGE_RESTART ]; then
              FORCE_BRIDGE=1
              echo "forced clean bridge restart requested"
              systemctl --user stop hermes-gateway 2>/dev/null \
                || sudo systemctl stop hermes-gateway 2>/dev/null || true
              sleep 3
              echo "running hermes postinstall (node bridge deps)…"
              timeout 180 hermes postinstall 2>/dev/null || echo "  (postinstall skipped/failed)"
            fi
            # ROOT CAUSE of the WhatsApp outage: the bridge is a node HTTP server
            # on port 3000. Repeated restarts leave a STALE bridge holding 3000, so
            # the fresh bridge can't bind and the gateway logs "Cannot connect to
            # 127.0.0.1:3000" then exits (service Failed). Free the port BEFORE the
            # restart. Kill by PORT (fuser/lsof), never by name — 'node'/'whatsapp'
            # would also match THIS deploy script and kill the run.
            systemctl --user stop hermes-gateway 2>/dev/null \
              || sudo systemctl stop hermes-gateway 2>/dev/null || true
            fuser -k 3000/tcp 2>/dev/null \
              || kill $(lsof -ti tcp:3000 2>/dev/null) 2>/dev/null \
              || true
            sleep 2
            # (Re)start the gateway on the correct unit. `restart` also starts a
            # stopped unit. Avoid bare `hermes gateway restart` unless no unit
            # exists — it can run in the foreground and hang a non-login SSH session.
            UP=""
            if systemctl --user cat hermes-gateway >/dev/null 2>&1; then
              systemctl --user restart hermes-gateway 2>/dev/null && UP="user"
            fi
            if [ -z "$UP" ] && sudo systemctl cat hermes-gateway >/dev/null 2>&1; then
              sudo systemctl restart hermes-gateway 2>/dev/null && UP="system"
            fi
            if [ -z "$UP" ]; then
              timeout 25 hermes gateway restart 2>/dev/null || true
              UP="fallback"
            fi
            # Give the WhatsApp bridge time to spawn on the freed port and connect
            # before the diagnostics probe it (it can take >15s to come up).
            echo "waiting for bridge to bind port 3000 and connect…"; sleep 25
            # SAFE diagnostics — service STATE only. This Actions log is PUBLIC,
            # so never print logs, transcripts, .env, or config *contents* here.
            echo "===== diagnostics (state only) ====="
            echo "restarted via: $UP"
            echo "user  is-active: $(systemctl --user is-active hermes-gateway 2>&1)"
            echo "sys   is-active: $(sudo systemctl is-active hermes-gateway 2>&1)"
            echo "user  state: $(systemctl --user show -p ActiveState -p SubState -p Result -p ExecMainStatus hermes-gateway 2>&1 | tr '\n' ' ')"
            echo "sys   state: $(sudo systemctl show -p ActiveState -p SubState -p Result -p ExecMainStatus hermes-gateway 2>&1 | tr '\n' ' ')"
            "${PYBIN:-python3}" -c "import yaml,os;yaml.safe_load(open(os.path.expanduser('~/.hermes/config.yaml')));print('config.yaml: valid YAML')" 2>&1 || echo "config.yaml: INVALID YAML"
            echo "whatsapp enabled in .env: $(grep -q '^WHATSAPP_ENABLED=true' ~/.hermes/.env && echo yes || echo 'no/unset')"
            echo "allowlist set in .env: $(grep -q '^WHATSAPP_ALLOWED_USERS=..*' ~/.hermes/.env && echo yes || echo 'no/empty')"
            # Is the WhatsApp linked-device session still present? (file counts +
            # newest mtime only — NEVER contents, so no numbers/JIDs leak). If the
            # dir is gone/empty, the device was logged out and needs a QR re-scan.
            for d in ~/.hermes/whatsapp ~/.hermes/whatsapp/session ~/.hermes/whatsapp/auth ~/.hermes/baileys; do
              if [ -d "$d" ]; then
                echo "wa-session $d: $(find "$d" -type f 2>/dev/null | wc -l) files; newest $(find "$d" -type f -printf '%TY-%Tm-%Td %TH:%TM\n' 2>/dev/null | sort | tail -1)"
              fi
            done
            # restored-marker presence (so we can see the restore ran).
            echo "restore marker present: $([ -f "$HOME/.hermes/.restored" ] && echo yes || echo no)"
            # The node bridge's OWN log — the gateway pointed here. This has the
            # real reason the bridge starts but the gateway can't connect to it on
            # port 3000. Numbers/JIDs redacted.
            echo "--- whatsapp/bridge.log (tail, redacted) ---"
            (tail -50 "$HOME/.hermes/whatsapp/bridge.log" 2>/dev/null \
              | sed -E 's/[0-9]{6,}/<num>/g; s/[0-9]+@(s\.whatsapp\.net|g\.us|lid)/<jid>/g' \
              | tail -40) || echo "  (no bridge.log)"
            # What is actually listening on port 3000 (if anything)?
            echo "--- port 3000 listener ---"
            (ss -ltnp 2>/dev/null | grep ':3000' | sed -E 's/pid=[0-9]+/pid=<n>/g') \
              || (sudo lsof -iTCP:3000 -sTCP:LISTEN 2>/dev/null | sed -E 's/[0-9]{5,}/<n>/g' | head -3) \
              || echo "  (nothing listening on 3000)"
            # Gateway log lines about the WhatsApp bridge / connection / errors.
            # Filtered to network-layer + error keywords (NOT conversation content)
            # to protect the friend's therapy data even though this log is private.
            # Phone numbers/JIDs are still redacted.
            echo "--- gateway log: whatsapp / connection / errors (tail) ---"
            (journalctl --user -u hermes-gateway --no-pager -n 1500 2>/dev/null \
              | grep -iE 'whatsapp|baileys|bridge|websocket|connection (open|close|update|failure)|logged.?out|logout|disconnect|reconnect|qr|conflict|stream error|precondition|unauthorized|40[0-9]|ECONN|EADDR|spawn|ENOENT|node:|traceback|error|exception|failed' \
              | grep -viE 'content=|"content"|"text"|body=|"body"' \
              | sed -E 's/[0-9]{6,}/<num>/g; s/[0-9]+@(s\.whatsapp\.net|g\.us|lid)/<jid>/g' \
              | tail -45) \
              || echo "  (no gateway journal available)"
            echo "===== end diagnostics ====="
            echo "hermes restarted"
